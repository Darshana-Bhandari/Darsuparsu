<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Darsu Notes</title>
  <link rel="stylesheet" href="Note_App.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
 
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">📝</span>
      <span class="app-name">Darsu Notes</span>
    </div>
    <div class="header-right">
      <span class="notes-counter" id="notesCounter">0 notes</span>
      <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light mode">🌙</button>
    </div>
  </header>

   <!-- Main Content -->
  <main class="main">
 
    <!-- Search -->
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Search notes by title or content…" />
      <button class="search-clear" id="searchClear" title="Clear search">✕</button>
 
      <!-- Add / Edit Note Form -->
    <section class="form-section glass-card">
      <h2 class="form-title" id="formTitle">New Note</h2>
      <input type="text" id="noteTitle" class="form-input" placeholder="Title" maxlength="100" />
      <textarea id="noteContent" class="form-textarea" placeholder="What's on your mind…" maxlength="500"></textarea>
      <div class="form-footer">
        <span class="char-counter" id="charCounter">0 / 500</span>
        <div class="form-actions">
          <button class="btn btn-ghost" id="cancelBtn" style="display:none">Cancel</button>
          <button class="btn btn-primary" id="saveBtn">➕ Add Note</button>
        </div>
      </div>
    </section>

     <!-- Notes Grid -->
    <section class="notes-section">
      <div class="notes-grid" id="notesGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <span class="empty-icon">😔</span>
        <p class="empty-title">No notes found</p>
        <p class="empty-sub">Try a different search or add a new note above.</p>
      </div>
    </section>
  </main>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal glass-card">
      <p class="modal-title">Delete this note?</p>
      <p class="modal-sub">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelDelete">No, keep it</button>
        <button class="btn btn-danger" id="confirmDelete">Yes, delete</button>
      </div>
    </div>
  </div>

  <script src="Note_App.js"></script>
</body>
</html>

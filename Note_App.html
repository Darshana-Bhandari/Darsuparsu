<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darsu Notes</title>
  <link rel="stylesheet" href="Note_App.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <main class="app-grid">
      <section class="panel panel-left">
        <div class="panel-header">
          <button class="icon-btn menu-btn" aria-label="Menu">&#9776;</button>
          <div>
            <p class="eyebrow">All Notes</p>
            <h1 class="panel-title">My Notes</h1>
          </div>
          <span id="notesCounter" class="header-pill">0</span>
        </div>

        <div class="search-card">
          <span class="search-icon">&#128269;</span>
          <input id="searchInput" class="search-field" type="search" placeholder="Search notes" aria-label="Search notes" />
          <button id="clearSearch" class="search-clear" aria-label="Clear search">&#10005;</button>
        </div>

        <div class="categories-row" id="categoryRow">
          <button class="category-pill active" type="button" data-category="personal"><span>&#128100;</span> Personal</button>
          <button class="category-pill" type="button" data-category="work"><span>&#128188;</span> Work</button>
          <button class="category-pill" type="button" data-category="travel"><span>&#128659;</span> Travel</button>
          <button class="category-pill" type="button" data-category="health"><span>&#10084;</span> Health</button>
          <button class="category-pill add-pill" type="button" data-category="all">+</button>
        </div>

        <div id="notesContainer" class="notes-list"></div>

        <nav class="bottom-nav">
          <button class="bottom-action active" type="button" data-tab="notes"><span>&#128221;</span><small>Notes</small></button>
          <button class="bottom-action" type="button" data-tab="favorite"><span>&#9734;</span><small>Favorite</small></button>
          <button class="bottom-action" type="button" data-tab="todos"><span>&#10003;</span><small>To-dos</small></button>
          <button class="bottom-action" type="button" data-tab="settings"><span>&#9881;</span><small>Settings</small></button>
        </nav>
      </section>

      <section class="panel panel-right">
        <div class="panel-header panel-header-right">
          <button id="clearForm" class="icon-btn back-btn" aria-label="Back">&#8592;</button>
          <div>
            <h2 class="panel-title">Add Notes</h2>
            <p class="meta-text" id="formMeta">Today 2:00 pm</p>
          </div>
          <button id="saveBtn" class="icon-btn done-btn" aria-label="Save note">&#10003;</button>
        </div>

        <div class="form-panel">
          <label class="field-label" for="noteTitle">Title</label>
          <input id="noteTitle" class="field-input" type="text" placeholder="New project briefing" maxlength="80" />

          <label class="field-label" for="noteDescription">Description</label>
          <textarea id="noteDescription" class="field-textarea" rows="12" placeholder="Type your note details here..." maxlength="260"></textarea>
          <div class="field-footer">
            <span class="char-count" id="charCounter">0 / 260</span>
          </div>
        </div>

        <div class="tools-row">
          <button class="tool-btn" type="button">&#128214;<span>Checklist</span></button>
          <button class="tool-btn" type="button">Aa<span>Format</span></button>
          <button class="tool-btn" type="button">&#127909;<span>Gallery</span></button>
          <button class="tool-btn" type="button">&#9997;<span>Handwrite</span></button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="Note_App.js"></script>
</body>
</html>
